<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AREPRO — Amplified Real Estate Professional</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;0,900;1,300;1,400&family=Barlow+Condensed:wght@600;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #D4A017;
  --gold-bright: #F5C518;
  --black: #000000;
  --dark: #0A0A0A;
  --dark2: #111111;
  --dark3: #161616;
  --white: #FFFFFF;
  --grey: #666666;
  --light: #F0EDE6;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--black);
  color: var(--white);
  overflow-x: hidden;
}

/* SPLASH */
#splash {
  position: fixed;
  inset: 0;
  background: var(--black);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 40px 28px 60px;
  overflow-y: auto;
}

.splash-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;
  letter-spacing: 10px;
}

.splash-logo span { color: var(--gold-bright); }

.splash-sub {
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--grey);
  margin-bottom: 40px;
}

.enter-btn {
  margin-top: 40px;
  background: var(--gold-bright);
  color: var(--black);
  padding: 16px 40px;
  border: none;
  font-weight: 900;
  letter-spacing: 3px;
  cursor: pointer;
}

/* MAIN */
#main-site { display: none; }

nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: #000;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
}

.nav-logo {
  font-family: 'Bebas Neue';
  letter-spacing: 5px;
  color: white;
  text-decoration: none;
}

.nav-logo span { color: var(--gold-bright); }

.section {
  padding: 100px 20px;
  text-align: center;
}

.hero {
  padding-top: 120px;
}

.hero h1 {
  font-family: 'Bebas Neue';
  font-size: 60px;
}

.hero span { color: var(--gold-bright); }

.btn {
  margin-top: 20px;
  display: inline-block;
  background: var(--gold-bright);
  color: black;
  padding: 15px 30px;
  text-decoration: none;
  font-weight: bold;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo"><span>ARE</span>PRO</div>
  <div class="splash-sub">Amplified Real Estate Professional</div>
  <button class="enter-btn" onclick="enterSite()">ENTER</button>
</div>

<!-- MAIN -->
<div id="main-site">

<nav>
  <a href="#" class="nav-logo"><span>ARE</span>PRO</a>
</nav>

<div class="section hero">
  <h1>STOP CHASING LEADS.<br><span>LET THEM COME TO YOU.</span></h1>
  <a href="#" class="btn">START DOMINATING</a>
</div>

</div>

<script>
function enterSite() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('main-site').style.display = 'block';
}
</script>

</body>
</html>
